services:
  - type: web
    name: fish-detection-api
    env: docker
    plan: free  # FREE TIER - spindown after 15 min inactivity
    
    # Docker configuration
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    
    # Port configuration
    ports:
      - port: 10000
        protocol: HTTP
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: WORKERS
        value: "2"  # Reduced for free tier
      - key: MODEL_DOWNLOAD_URL
        value: ""  # Set your S3/external storage URL here
    
    # Health check (required for free tier)
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # NO PERSISTENT DISK on free tier
    # Models must be: 1) Included in git directly, OR
    #                 2) Downloaded from external storage on startup
    
    # Timeout settings
    timeout: 300
    
    # Build settings
    rootDir: fastapi_app
    buildCommand: echo "Building Fish Detection API for Render..."
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
